<h1 class="text-3xl">{{count()}}</h1>
<h1 class="text-3xl">{{x}}</h1>
<button (click)="count.set(100)" class="bg-fuchsia-400 rounded-2xl">increse value</button>
<button (click)="x=500" class="bg-orange-400 rounded-2xl m-5">increse value</button>
<button (click)="updatevalue('inc')" class="bg-purple-500 rounded-2xl m-5">Update 1 value </button>
<button (click)="updatevalue('dec')" class="bg-purple-500 rounded-2xl m-5">Update 2 value </button>




<div class="h-200 w-full bg-linear-65 from-fuchsia-300 to-pink-200">
    <h1 class="text-3xl">{{count2()}} </h1>
    <button (click)="updatevalue2()" class="bg-cyan-500 ">update</button>
</div>
