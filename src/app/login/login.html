<div class="max-w-lg mx-auto mt-10 p-6 bg-white text-shadow-lg shadow-lg rounded-lg">

    <h2 class="text-2xl font-bold mb-4 text-center">
        User Form
    </h2>

    <!-- Name -->
    <label>Name</label>
    <input type="text" [(ngModel)]="name" class="w-full border p-2 mb-4" placeholder="Enter name">

    <!-- Email -->
    <label>Email</label>
    <input type="email" [(ngModel)]="email" class="w-full border p-2 mb-4" placeholder="Enter email">

    <!-- Password -->
    <label>Password</label>
    <input type="password" [(ngModel)]="password" class="w-full border p-2 mb-4" placeholder="Enter password">

    <button (click)="submitForm()" class="w-full bg-blue-500 text-white p-2 rounded">
        Submit
    </button>

</div>
