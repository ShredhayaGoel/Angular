<h1 class="text-center text-3xl bg-amber-100 p-5 mt-2">Counter</h1>

<h2 class="text-4xl text-center">{{count}}</h2>

<div>
    <button class="m-5 bg-orange-400 rounded-4xl p-5 text-2xl border-2 " (click)="handleincrement()">Increment</button>
    <button class="m-5 bg-cyan-400 rounded-4xl p-5 text-2xl border-2" (click)="handleReset()">Reset</button>
    <button class="m-5 bg-red-400 rounded-4xl p-5 text-2xl border-2" (click)="handleDeccrement()">Decrement</button>

</div>
<div class="mx-auto  w-100">
    <button (click)="handlevent($event)"
        class="bg-cyan-100 w-50 h-50 rounded-2xl border-2 m-5 text-center">Click</button>
</div>
<div class="mx-auto  w-100">
    <button (mouseenter)="handlevent($event)"
        class="bg-cyan-100 w-50 h-50 rounded-2xl border-2 m-5 text-center">Click</button>

</div>
<div class="mx-auto  w-100">
    <button (mouseleave)="handlevent($event)"
        class="bg-cyan-100 w-50 h-50 rounded-2xl border-2 m-5 text-center">Click</button>
</div>
<input (input)="handlevent($event)" type="text" name="name" placeholder="Enter value"
    class="border-2 w-full h-15 bg-cyan-200">
