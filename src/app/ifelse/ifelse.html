<h1>IF ELSE STATEMENT</h1>

<button (click)="hide()" class="bg-blue-900 rounded-2xl border-2 m-5 text-white w-25">hide</button>
<button (click)="show()" class="bg-green-700 rounded-2xl border-2 m-5 text-white w-25">show</button>
<button (click)="toggle()" class="bg-emerald-500 rounded-2xl border-2 m-5 text-white w-25">Toggle</button>


@if(display){
<div class="w-50 h-50 mx-auto bg-amber-200"></div>
}
