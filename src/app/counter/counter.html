<h1 class="text-center text-3xl bg-amber-100 p-5 mt-2">Counter</h1>

<h2 class="text-4xl text-center">{{count}}</h2>

<div>
    <button class="m-5 bg-orange-400 rounded-4xl p-5 text-2xl border-2 " (click)="handleincrement()">Increment</button>
    <button class="m-5 bg-cyan-400 rounded-4xl p-5 text-2xl border-2" (click)="handleReset()">Reset</button>
    <button class="m-5 bg-red-400 rounded-4xl p-5 text-2xl border-2" (click)="handleDeccrement()">Decrement</button>

</div>
<div class="mx-auto  w-100">
    <button (click)="handlevent($event)"
        class="bg-cyan-100 w-50 h-50 rounded-2xl border-2 m-5 text-center">Click</button>
</div>
<div class="mx-auto  w-100">
    <button (mouseenter)="handlevent($event)"
        class="bg-cyan-100 w-50 h-50 rounded-2xl border-2 m-5 text-center">Click</button>

</div>
<div class="mx-auto  w-100">
    <button (mouseleave)="handlevent($event)"
        class="bg-cyan-100 w-50 h-50 rounded-2xl border-2 m-5 text-center">Click</button>
</div>
<input (input)="handlevent($event)" type="text" name="name" placeholder="Enter value"
    class="border-2 w-full h-15 bg-cyan-200">

<div class="h-200 w-full bg-linear-65 from-cyan-200 to-amber-100">

    <h1 class="text-3xl text-center p-5">{{displayname}}</h1>

    <input (input)="getname($event)" value={{name}} type="text" placeholder="Enter value"
        class="border-2 h-5 w-100 m-10 p-5 text-2xl bold">

    <!-- <button (click)="getname($event)" class="bg-blue-400 rounded-2xl text-white w-full h-25 border-black border-2">GET
        NAME </button>-->

    <button (click)="showname($event)"
        class="bg-blue-400 rounded-2xl text-white w-full h-25 mt-5 border-black border-2">SHOW
        NAME </button>

    <button (click)="setName()" class="bg-blue-400 rounded-2xl text-white w-full h-25 mt-5 border-black border-2">SET
        NAME </button>

    <h1 class="text-3xl">Email : {{emailInput.value}}</h1>

    <input type="text" value={{email}} placeholder="Enter your Email" #emailInput
        class="border-2 h-5 w-100 m-10 p-5 text-2xl bold">

    <button (click)="getemail(emailInput.value)"
        class="m-5 bg-orange-400 max-w-full h-25 p-5 rounded-2xl border-amber-600 border-4">GET EMail</button>

    <button (click)="setemail()" class="m-5 bg-orange-400 max-w-full h-25 p-5 rounded-2xl border-amber-600 border-4">SET
        EMail</button>

</div>
